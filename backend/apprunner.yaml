version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  runtime-version: 3.11
  command: python -m compliance_discovery.api_server
  network:
    port: 5001
    env: PORT
  env:
    - name: FLASK_APP
      value: "compliance_discovery.api_server"
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: DATABASE_PATH
      value: "/app/data/sessions.db"
